    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .confirm-sub { font-size: 13px; color: var(--sub); }
    #wa-confirm-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; background: #25d366; color: #fff;
      border-radius: 14px; text-decoration: none; font-weight: 700; font-family: inherit;
      font-size: 15px; transition: opacity 0.15s;
    }
    #wa-confirm-btn:hover { opacity: 0.9; }
    #novo-pedido-btn {
      width: 100%; padding: 12px; background: #F4F4F0;
      border: none; border-radius: 14px; font-size: 14px; font-weight: 600;
      font-family: inherit; color: var(--sub); cursor: pointer;
    }

    /* ── Search empty state ── */
    .search-empty { padding: 60px 24px; text-align: center; background: #fff; }
    .search-empty-icon { font-size: 36px; margin-bottom: 10px; }
    .search-empty-title { font-size: 15px; font-weight: 600; color: var(--ink); }
    .search-empty-sub { font-size: 13px; color: var(--sub); margin-top: 4px; }

    /* ── Logo img ── */
    .store-logo { overflow: hidden; }
    .store-logo img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 4px; }

    /* ── Item sheet inner (wrapper for modal on desktop) ── */
    #item-sheet-inner { display: flex; flex-direction: column; flex: 1; min-height: 0; }

    /* ════════════════════════════════════════
       DESKTOP LAYOUT  ≥ 960px
    ════════════════════════════════════════ */
    @media (min-width: 960px) {

      /* hero */
      .store-cover { height: 120px; }
      .store-card { margin: 0 28px; margin-top: -40px; padding: 20px 28px; }
      .store-logo { width: 140px; height: 96px; border-radius: 18px; }
      .store-row { justify-content: center; }
      .store-name { font-size: 22px; }

      /* hide mobile elements */
      .search-wrap { display: none !important; }
      #cat-tabs    { display: none !important; }
      #cart-fab    { display: none !important; }
      #cart-backdrop { display: none !important; }
      .sheet-handle  { display: none; }

      /* content body: reserve space for left-nav and cart */
      #page-body {
        display: flex; align-items: flex-start; gap: 0;
        max-width: 1600px; margin: 0 auto;
      }

      /* left nav */
      #desktop-left-nav {
        display: flex !important;
        flex-direction: column;
        width: 220px; flex-shrink: 0;
        position: sticky; top: 0;
        height: 100vh;
        padding: 24px 16px 24px 28px;
        box-sizing: border-box;
      }
      #desktop-nav-card {
        background: #fff; border: 1px solid var(--border);
        border-radius: 14px; padding: 8px;
        overflow-y: auto; flex: 1;
        display: flex; flex-direction: column;

      #desktop-nav-label {
        padding: 8px 12px 6px; font-size: 10.5px; font-weight: 700;

      /* desktop search inside nav card */
      #dt-nav-search {
        display: flex; align-items: center; gap: 8px;
        background: #F4F4F0; border-radius: 10px; padding: 9px 12px;
        margin: 0 4px 6px; flex-shrink: 0;

        flex: 1; background: transparent; border: none; outline: none;
        font-size: 13px; font-family: inherit; color: var(--ink);

      #dt-nav-search input::placeholder { color: var(--sub); }
      .dt-nav-btn {
        width: 100%; display: flex; align-items: center; justify-content: space-between;
        padding: 9px 12px; border: none; border-radius: 10px;

      }
      .dt-nav-btn.active span.nav-name { padding-left: 6px; }
      .dt-nav-count { font-size: 11px; color: var(--sub); font-weight: 600; flex-shrink: 0; }

      /* center content */
      #desktop-center { flex: 1; min-width: 0; padding: 0 0 80px; }

      /* cart becomes fixed right panel */
      #cart-sheet {
        position: sticky !important;
        top: 0;
        width: 300px; flex-shrink: 0;
        max-height: 100vh;
        transform: none !important;
        border-top-left-radius: 0; border-top-right-radius: 0;
        border-left: 1px solid var(--border);
        border-radius: 0;
        box-shadow: none;
        align-self: flex-start;

      #cart-sheet { display: flex !important; flex-direction: column; }
      .cart-head { padding: 14px 16px 10px; }
      #cart-body-main { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; }

      /* item grid 2-col on desktop */

        display: grid !important;

        gap: 10px;
        padding: 0 16px 16px;
        border-top: none !important;
      }
      .item-row {

    }

    @media (min-width: 960px) {

<script>
(async () => {
  const API_URL = 'https://backdubon-production.up.railway.app';

  /* ─── Helpers ─── */
  function fmt(v) { return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }

  function calcularAberto(horarios) {
    const agora = new Date();
    const dia = String(agora.getDay());
    const hh = String(agora.getHours()).padStart(2, '0');
    const mm = String(agora.getMinutes()).padStart(2, '0');
    const horaAtual = `${hh}:${mm}`;
    const cfg = (horarios || {})[dia];
    const abre  = cfg?.abre  || '12:00';
    const fecha = cfg?.fecha || '22:00';
    const ativo = cfg?.ativo !== false;
    return { aberto: ativo && horaAtual >= abre && horaAtual < fecha, abre, fecha };
  }

  function sortByOrdem(a, b) {
    const oa = a.ordem ?? 0, ob = b.ordem ?? 0;
    if (oa > 0 && ob > 0) return oa - ob;
    if (oa > 0) return -1;
    if (ob > 0) return 1;
    return a.nome.localeCompare(b.nome, 'pt-BR');
  }

  function picolePrice(precos, qty) {
    const keys = Object.keys(precos).map(Number).sort((a, b) => b - a);
    for (const k of keys) { if (qty >= k) return precos[String(k)]; }
    return precos['1'] || 0;
  }

  function somaQty(flavorMap) { return Object.values(flavorMap).reduce((a, b) => a + b, 0); }

  /* ─── Normalizar cardápio ─── */
  function normalizarCardapio(apiData) {
    const categorias = (apiData.categorias || []).map((cat) => {
      const tipo = cat.tipo.toLowerCase();
      const tipoRender = tipo === 'picole' ? 'picole' : 'pote';
      const precos_quantidade = {};
      (cat.precosPorQuantidade || []).forEach((p) => {
        precos_quantidade[String(p.quantidadeMinima)] = parseFloat(p.preco);
      });
      const preco_unico = cat.precosPorQuantidade?.[0]
        ? parseFloat(cat.precosPorQuantidade[0].preco)
        : (cat.precoKilo ? parseFloat(cat.precoKilo) : 0);
      return {
        ...cat,
        tipo: tipoRender,
        tipoOriginal: tipo,
        preco_unico,
        precos_quantidade,
        pool_quantidade: !!cat.poolId,
        produtos: [...(cat.produtos || [])].sort(sortByOrdem),
      };
    });
    categorias.sort(sortByOrdem);

    let horarios = {};
    try { if (apiData.configuracoes?.horarios_funcionamento) horarios = JSON.parse(apiData.configuracoes.horarios_funcionamento); } catch {}
    const { aberto, abre, fecha } = calcularAberto(horarios);

    return {
      whatsapp: apiData.configuracoes?.whatsapp_loja || '',
      taxa_entrega: parseFloat(apiData.configuracoes?.taxa_entrega || '0'),
      pix_chave: apiData.configuracoes?.pix_chave || '',
      pix_nome:  apiData.configuracoes?.pix_nome  || '',
      pix_tipo:  apiData.configuracoes?.pix_tipo  || '',
      aberto, abre, fecha, horarios, categorias,
    };
  }

  /* ─── Formatar horário para o footer ─── */
  function formatarHorarioFooter(horarios) {
    const nomesDias = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
    function fmtH(t) { return t.endsWith(':00') ? t.slice(0, -3) + 'h' : t.replace(':', 'h'); }
    const hoje = new Date().getDay();

    return [0,1,2,3,4,5,6].map(d => {
      const cfg  = horarios[String(d)];
      const ativo = !cfg || cfg.ativo !== false;
      const abre  = cfg?.abre  || '12:00';
      const fecha = cfg?.fecha || '22:00';
      const diaClass  = d === hoje ? 'footer-h-dia hoje' : 'footer-h-dia';
      const horaLabel = ativo ? `${fmtH(abre)} às ${fmtH(fecha)}` : 'Fechado';
      const horaClass = ativo ? 'footer-h-hora' : 'footer-h-hora fechado';
      return `<div class="footer-h-row"><span class="${diaClass}">${nomesDias[d]}</span><span class="${horaClass}">${horaLabel}</span></div>`;
    }).join('');
  }

  /* ─── Fetch ─── */
  let cardapio;
  try {
    const res = await fetch(API_URL + '/api/cardapio');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cardapio = normalizarCardapio(await res.json());
  } catch {
    document.getElementById('menu').innerHTML =
      '<p style="text-align:center;color:#e74c3c;padding:48px 24px">Erro ao carregar o cardápio.</p>';
    return;
  }

  const { whatsapp, taxa_entrega: taxaEntrega, pix_chave: pixChave, pix_nome: pixNome, pix_tipo: pixTipo, aberto: lojaAberta } = cardapio;

  /* ─── Store meta bar ─── */
  const storeMeta = document.getElementById('store-meta');
  storeMeta.innerHTML = `
    <div class="meta-cell">
      <div class="meta-cell-inner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7180" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span class="meta-label">${cardapio.abre} – ${cardapio.fecha}</span>
      </div>
    </div>
    <div class="meta-div"></div>
    <div class="meta-cell">
      <div class="meta-cell-inner">
        ${lojaAberta
          ? `<span class="open-dot"></span><span class="open-label">Aberto</span>`
          : `<span class="closed-label">Fechado</span>`}
      </div>
    </div>
  `;

  /* ─── Footer WhatsApp + horário ─── */
  document.getElementById('footer-wa').href = whatsapp ? `https://wa.me/${whatsapp}` : '#';
  const horarioHTML = formatarHorarioFooter(cardapio.horarios);
  if (horarioHTML) document.getElementById('footer-horario').innerHTML = horarioHTML;

  /* ─── Cart state ─── */
  let cart = [];
  let nextId = 0;
  let tipoEntrega = 'entrega';
  let formaPagamento = null;
  let precisaTroco = false;

  /* ─── Picolé state ─── */
  const picoleQty = {};
  const prodIdMap = {};
  cardapio.categorias.forEach((cat, idx) => {
    if (cat.tipo === 'picole') {
      picoleQty[idx] = {};
      prodIdMap[idx] = {};
      cat.produtos.forEach((p) => { picoleQty[idx][p.nome] = 0; prodIdMap[idx][p.nome] = p.id; });
    }
  });

  function catDoItem(item) { return cardapio.categorias.find((c) => c.nome === item.categoria) || {}; }
  function ehPoolQtd(cat) { return cat.pool_quantidade === true; }

  function precoEfetivoPicole(catIdx, cat) {
    if (!ehPoolQtd(cat)) return picolePrice(cat.precos_quantidade, 1);
    let totalSelecao = 0;
    cardapio.categorias.forEach((c, i) => { if (ehPoolQtd(c)) totalSelecao += somaQty(picoleQty[i]); });
    const totalCarrinho = cart.filter((i) => i.tipo === 'picole' && ehPoolQtd(catDoItem(i))).reduce((s, i) => s + i.qty, 0);
    return picolePrice(cat.precos_quantidade, totalSelecao + totalCarrinho);
  }

  function recalcularCarrinhoPicole() {
    const totalPoolCarrinho = cart.filter((i) => i.tipo === 'picole' && ehPoolQtd(catDoItem(i))).reduce((s, i) => s + i.qty, 0);
    cart.forEach((item) => {
      if (item.tipo !== 'picole') return;
      const cat = catDoItem(item);
      if (!cat.precos_quantidade) return;
      item.preco = ehPoolQtd(cat) ? picolePrice(cat.precos_quantidade, totalPoolCarrinho) : picolePrice(cat.precos_quantidade, 1);
      item.total = item.preco * item.qty;
    });
  }

  /* ─── Item detail sheet ─── */
  let itemSheetQty = 1;
  let itemSheetNote = '';
  let itemSheetData = null;

  function openItemSheet(cat, prod) {
    itemSheetQty = 1;
    itemSheetNote = '';
    itemSheetData = { cat, prod };

    const precoUnit = (prod.preco ? parseFloat(prod.preco) : null) || cat.preco_unico;
    const unLabel = cat.tipoOriginal === 'kilo' ? '/kg' : '';

    document.getElementById('item-sheet-body').innerHTML = `
      <div class="item-cat-badge">
        <span class="item-cat-badge-dot"></span>
        <span>${cat.nome}${cat.descricao ? ' · ' + cat.descricao.split('·')[0].trim() : ''}</span>
      </div>
      <div class="item-name">${prod.nome}${prod.tamanho ? ' <span style="font-size:15px;font-weight:500;color:var(--sub)">· ' + prod.tamanho + '</span>' : ''}</div>
      ${prod.descricao ? `<div class="item-desc">${prod.descricao}</div>` : ''}
      <div class="item-price">${fmt(precoUnit)}${unLabel ? ' <span style="font-size:14px;font-weight:500;color:var(--sub)">' + unLabel + '</span>' : ''}</div>
      ${cat.tipoOriginal === 'kilo' ? `
      <div class="obs-row">
        <span class="obs-label">Observação</span>
        <span class="obs-count" id="obs-count">Opcional · 0/300</span>
      </div>
      <textarea class="obs-input" id="obs-input" rows="2" placeholder="Ex: sem castanhas, calda à parte…"></textarea>
      ` : ''}
    `;

    if (cat.tipoOriginal === 'kilo') {
      const textarea = document.getElementById('obs-input');
      textarea.addEventListener('input', () => {
        itemSheetNote = textarea.value.slice(0, 300);
        textarea.value = itemSheetNote;
        document.getElementById('obs-count').textContent = `Opcional · ${itemSheetNote.length}/300`;
      });
    }

    renderItemFooter(precoUnit, unLabel);

    document.getElementById('item-backdrop').classList.add('open');
    document.getElementById('item-sheet').classList.add('open');
  }

  function renderItemFooter(precoUnit, unLabel) {
    const total = itemSheetQty * precoUnit;
    document.getElementById('item-sheet-footer').innerHTML = `
      <div class="stepper">
        <button class="stepper-btn" id="step-minus" ${itemSheetQty <= 1 ? 'disabled' : ''}>−</button>
        <span class="stepper-val">${itemSheetQty}</span>
        <button class="stepper-btn" id="step-plus">+</button>
      </div>
      <button class="item-cta" id="item-cta-btn">
        <span>Adicionar</span>
        <span>${fmt(total)}</span>
      </button>
    `;

    document.getElementById('step-minus').addEventListener('click', () => {
      if (itemSheetQty > 1) { itemSheetQty--; renderItemFooter(precoUnit, unLabel); }
    });
    document.getElementById('step-plus').addEventListener('click', () => {
      itemSheetQty++; renderItemFooter(precoUnit, unLabel);
    });
    document.getElementById('item-cta-btn').addEventListener('click', () => {
      if (!itemSheetData) return;
      const { cat, prod } = itemSheetData;
      const preco = (prod.preco ? parseFloat(prod.preco) : null) || cat.preco_unico;
      cart.push({
        id: nextId++,
        categoria: cat.nome,
        emoji: cat.emoji,
        tipo: 'pote',
        saborLabel: prod.nome,
        produtoId: prod.id,
        qty: itemSheetQty,
        preco,
        total: preco * itemSheetQty,
        note: itemSheetNote,
      });
      updateCartUI();
      closeItemSheet();
    });
  }

  function closeItemSheet() {
    document.getElementById('item-backdrop').classList.remove('open');
    document.getElementById('item-sheet').classList.remove('open');
    itemSheetData = null;
  }

  document.getElementById('item-backdrop').addEventListener('click', closeItemSheet);
  document.getElementById('item-sheet-close').addEventListener('click', closeItemSheet);

  /* ─── Add picolé to cart ─── */
  function addPicoleToCart(catIdx, cat) {
    const qtyMap = picoleQty[catIdx];
    const total = somaQty(qtyMap);
    if (total === 0) { alert('Selecione ao menos um picolé.'); return; }

    const preco = precoEfetivoPicole(catIdx, cat);
    const flavors = Object.entries(qtyMap)
      .filter(([, q]) => q > 0)
      .map(([nome, q]) => ({ produtoId: prodIdMap[catIdx][nome], nome, quantidade: q }));

    const saboresList = flavors
      .map(({ nome, quantidade }) => quantidade > 1 ? `${nome} (×${quantidade})` : nome)
      .join(', ');

    cart.push({ id: nextId++, categoria: cat.nome, emoji: cat.emoji, tipo: 'picole', saborLabel: saboresList, qty: total, preco: 0, total: 0, flavors });
    recalcularCarrinhoPicole();

    Object.keys(picoleQty[catIdx]).forEach((k) => { picoleQty[catIdx][k] = 0; });
    const section = document.querySelector(`.cat-section[data-cat-idx="${catIdx}"]`);
    if (section) {
      section.querySelectorAll('.qty-val').forEach((el) => { el.textContent = '0'; });
      section.querySelectorAll('.qty-btn').forEach((btn) => btn.classList.remove('filled'));
    }
    updateAllPicoleSummaries();
    updateCartUI();
  }

  /* ─── Render menu ─── */
  const menu = document.getElementById('menu');
  const tabsInner = document.getElementById('cat-tabs-inner');
  const sectionEls = {};
  const picoleSummaryEls = {};

  cardapio.categorias.forEach((cat, idx) => {
    /* Tab */
    const tab = document.createElement('button');
    tab.className = 'cat-tab' + (idx === 0 ? ' active' : '');
    tab.dataset.catId = String(idx);
    tab.innerHTML = `${cat.nome}${idx === 0 ? '<span class="cat-tab-bar"></span>' : ''}`;
    tab.addEventListener('click', () => scrollToSection(idx));
    tabsInner.appendChild(tab);

    /* Section */
    const section = document.createElement('div');
    section.className = 'cat-section';
    section.dataset.catIdx = String(idx);
    sectionEls[idx] = section;

    /* Header */
    const hdr = document.createElement('div');
    hdr.className = 'cat-section-header';

    const titleRow = document.createElement('div');
    titleRow.className = 'cat-title-row';

    const titleBlock = document.createElement('div');
    const title = document.createElement('h2');
    title.className = 'cat-title';
    title.textContent = (cat.emoji ? cat.emoji + ' ' : '') + cat.nome;
    titleBlock.appendChild(title);

    if (cat.descricao) {

      sub.className = 'cat-sub';
      sub.textContent = cat.descricao;
      titleBlock.appendChild(sub);
    }
    titleRow.appendChild(titleBlock);

    /* Price badge or tiers */
    if (cat.tipo === 'pote' && cat.preco_unico > 0) {
      const badge = document.createElement('div');
      badge.className = 'price-badge';
      const unLabel = cat.tipoOriginal === 'kilo' ? '/kg' : (cat.tipoOriginal === 'picole' ? '/un' : '');
      badge.textContent = fmt(cat.preco_unico) + (unLabel ? ' ' + unLabel : '');
      titleRow.appendChild(badge);
    }
    hdr.appendChild(titleRow);

    /* Picolé tiered pricing */
    if (cat.tipo === 'picole') {
      const p = cat.precos_quantidade;
      const tiers = [{ label: '1 unidade', key: '1' }, { label: '10 ou mais', key: '10' }, { label: '20 ou mais', key: '20' }]
        .filter(({ key }) => p[key] !== undefined);
      const prices = tiers.map((t) => p[t.key]);
      const hasTiers = tiers.length > 1 && !prices.every((v) => v === prices[0]);

        const tiersEl = document.createElement('div');
        tiersEl.className = 'price-tiers';
        tiers.forEach(({ label, key }) => {

        hdr.appendChild(badge);

    section.appendChild(hdr);

    /* Items */
    const list = document.createElement('div');

    if (cat.tipo === 'picole') {
      cat.produtos.forEach((prod) => {
        const row = document.createElement('div');

        const nameWrap = document.createElement('div');
        nameWrap.style.flex = '1';
        nameWrap.style.minWidth = '0';

        const nameEl = document.createElement('div');
        nameEl.className = 'picole-row-name' + (prod.disponivel ? '' : ' unavail');
        nameEl.textContent = prod.nome;
        nameWrap.appendChild(nameEl);

        if (prod.descricao) {
          const descEl = document.createElement('div');

          nameWrap.appendChild(descEl);
        }
        row.appendChild(nameWrap);

        const ctrl = document.createElement('div');
        ctrl.className = 'qty-ctrl';

        const btnMinus = document.createElement('button');
        btnMinus.className = 'qty-btn';
        btnMinus.textContent = '−';
        btnMinus.disabled = !prod.disponivel;

        const valEl = document.createElement('span');
        valEl.className = 'qty-val';
        valEl.textContent = '0';

        const btnPlus = document.createElement('button');
        btnPlus.className = 'qty-btn';
        btnPlus.textContent = '+';
        btnPlus.disabled = !prod.disponivel;

        if (prod.disponivel) {
          btnMinus.addEventListener('click', () => {
            if (picoleQty[idx][prod.nome] > 0) {
              picoleQty[idx][prod.nome]--;
              valEl.textContent = picoleQty[idx][prod.nome];
              if (picoleQty[idx][prod.nome] === 0) btnMinus.classList.remove('filled');
              onPicoleQtyChange(idx, cat);
            }
          });
          btnPlus.addEventListener('click', () => {
            picoleQty[idx][prod.nome]++;
            valEl.textContent = picoleQty[idx][prod.nome];
            btnMinus.classList.add('filled');
            onPicoleQtyChange(idx, cat);
          });
        }

        ctrl.appendChild(btnMinus);
        ctrl.appendChild(valEl);
        ctrl.appendChild(btnPlus);
        row.appendChild(ctrl);
        list.appendChild(row);
      });

      section.appendChild(list);

      const summary = document.createElement('div');
      summary.className = 'picole-summary';
      summary.innerHTML = '<span>Total: <strong>0 unidades</strong></span><span class="picole-summary-total">R$ 0,00</span>';
      picoleSummaryEls[idx] = summary;
      section.appendChild(summary);

      const addBtn = document.createElement('button');
      addBtn.className = 'picole-add-btn';
      addBtn.textContent = 'Adicionar ao pedido';
      addBtn.addEventListener('click', () => addPicoleToCart(idx, cat));
      section.appendChild(addBtn);

    } else {
      cat.produtos.forEach((prod) => {

        row.disabled = !prod.disponivel;

        body.className = 'item-row-body';

        nameEl.className = 'item-row-name';
        nameEl.textContent = prod.nome + (prod.tamanho ? ' · ' + prod.tamanho : '');
        body.appendChild(nameEl);

        if (prod.descricao) {
          const descEl = document.createElement('div');
          descEl.className = 'item-row-desc';
          descEl.textContent = prod.descricao;
          body.appendChild(descEl);
        }

        /* Show price: category price for pote/bebida, per-product price for casquinha */
        const displayPrice =
          cat.preco_unico > 0 ? cat.preco_unico :
          (prod.preco && parseFloat(prod.preco) > 0 ? parseFloat(prod.preco) : null);
        if (displayPrice && cat.tipoOriginal !== 'kilo') {
          const priceEl = document.createElement('div');
          priceEl.className = 'item-row-price';
          priceEl.textContent = fmt(displayPrice);
          body.appendChild(priceEl);
        }

        row.appendChild(body);

        /* + button */
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn-round';
        addBtn.innerHTML = '+';
        addBtn.setAttribute('aria-label', 'Adicionar ' + prod.nome);

        const cartQtyForProd = () => cart.filter((i) => i.produtoId === prod.id).reduce((s, i) => s + i.qty, 0);
        const refreshBtn = () => {
          const q = cartQtyForProd();
          addBtn.className = 'add-btn-round' + (q > 0 ? ' has-qty' : '');
          addBtn.innerHTML = q > 0 ? String(q) : '+';
        };

        if (prod.disponivel) {
          addBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openItemSheet(cat, prod);
          });
          row.addEventListener('click', () => openItemSheet(cat, prod));
        }

        /* store refresh ref so cart update can call it */
        addBtn.dataset.prodId = String(prod.id);

        row.appendChild(addBtn);
        list.appendChild(row);
      });

      section.appendChild(list);
    }

    menu.appendChild(section);
  });

  /* ─── Picolé summary update ─── */
  function updatePicoleSummary(idx, cat) {
    const el = picoleSummaryEls[idx];
    if (!el) return;
    const total = somaQty(picoleQty[idx]);
    const preco = precoEfetivoPicole(idx, cat);
    const valorTotal = preco * total;
    const unLabel = total === 1 ? '1 unidade' : `${total} unidades`;
    el.innerHTML = `<span>Total: <strong>${unLabel}</strong></span><span class="picole-summary-total">${fmt(valorTotal)}</span>`;
  }

  function updateAllPicoleSummaries() {
    cardapio.categorias.forEach((cat, idx) => { if (cat.tipo === 'picole') updatePicoleSummary(idx, cat); });
  }

  function onPicoleQtyChange(changedIdx, changedCat) {
    if (ehPoolQtd(changedCat)) {
      cardapio.categorias.forEach((cat, idx) => { if (ehPoolQtd(cat)) updatePicoleSummary(idx, cat); });
    } else {
      updatePicoleSummary(changedIdx, changedCat);
    }
  }

  /* ─── Sticky tabs IntersectionObserver ─── */
  const catTabEls = document.querySelectorAll('.cat-tab');
  let activeTabIdx = 0;
  const dtNavBtns = [];

  function setActiveTab(idx) {
    if (idx === activeTabIdx) return;
    activeTabIdx = idx;
    catTabEls.forEach((t, i) => {
      const isActive = String(i) === String(idx);
      t.classList.toggle('active', isActive);
      const bar = t.querySelector('.cat-tab-bar');
      if (isActive && !bar) { const b = document.createElement('span'); b.className = 'cat-tab-bar'; t.appendChild(b); }
      if (!isActive && bar) bar.remove();
    });
    dtNavBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
    /* scroll tab horizontally into view without touching page scroll */
    const activeTab = catTabEls[idx];
    const tabsContainer = document.getElementById('cat-tabs-inner');
    if (activeTab && tabsContainer) {
      const tabLeft  = activeTab.offsetLeft;
      const tabRight = tabLeft + activeTab.offsetWidth;
      const contLeft  = tabsContainer.scrollLeft;
      const contRight = contLeft + tabsContainer.offsetWidth;
      if (tabLeft < contLeft + 16) {
        tabsContainer.scrollTo({ left: tabLeft - 16, behavior: 'smooth' });
      } else if (tabRight > contRight - 16) {
        tabsContainer.scrollTo({ left: tabRight - tabsContainer.offsetWidth + 16, behavior: 'smooth' });
      }
    }
  }

  const observer = new IntersectionObserver(
    (entries) => {
      const visible = entries.filter((e) => e.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (visible[0]) setActiveTab(Number(visible[0].target.dataset.catIdx));
    },
    { rootMargin: '-80px 0px -55% 0px', threshold: 0 }
  );
  Object.values(sectionEls).forEach((el) => observer.observe(el));

  function scrollToSection(idx) {
    const el = sectionEls[idx];
    if (!el) return;
    const catTabs = document.getElementById('cat-tabs');
    const topbar  = document.getElementById('desktop-topbar');
    const offset  = (catTabs.offsetHeight || 0) + (topbar?.offsetHeight || 0) + 4;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top, behavior: 'smooth' });
  }

  /* ─── Search ─── */
  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    let anyVisible = false;
    cardapio.categorias.forEach((cat, idx) => {
      const section = sectionEls[idx];
      if (!section) return;
      if (!q) {
        section.style.display = '';
        section.querySelectorAll('.item-row, .picole-row').forEach((r) => { r.style.display = ''; });
        anyVisible = true;
        return;
      }
      let sectionMatch = cat.nome.toLowerCase().includes(q) || (cat.descricao || '').toLowerCase().includes(q);
      section.querySelectorAll('.item-row, .picole-row').forEach((r) => {
        const text = r.textContent.toLowerCase();
        const visible = text.includes(q) || sectionMatch;
        r.style.display = visible ? '' : 'none';
        if (visible) anyVisible = true;
      });
      const anyRow = [...section.querySelectorAll('.item-row, .picole-row')].some((r) => r.style.display !== 'none');
      section.style.display = anyRow ? '' : 'none';
    });

    let emptyEl = document.getElementById('search-empty');
    if (!anyVisible && q) {
      if (!emptyEl) {
        emptyEl = document.createElement('div');
        emptyEl.id = 'search-empty';
        emptyEl.className = 'search-empty';
        emptyEl.innerHTML = `<div class="search-empty-icon">🔍</div><div class="search-empty-title">Nada encontrado para "${q}"</div><div class="search-empty-sub">Tente outro sabor ou categoria.</div>`;
        menu.appendChild(emptyEl);
      } else {
        emptyEl.style.display = '';
        emptyEl.querySelector('.search-empty-title').textContent = `Nada encontrado para "${q}"`;
      }
    } else if (emptyEl) {
      emptyEl.style.display = 'none';
    }
  });

  /* ─── Cart UI ─── */
  function updateCartUI() {
    const totalQty = cart.reduce((s, i) => s + i.qty, 0);
    const fab = document.getElementById('cart-fab');
    const badge = document.getElementById('cart-fab-badge');
    const fabTotal = document.getElementById('cart-fab-total');

    if (totalQty > 0) {
      fab.classList.remove('compact');
      badge.style.display = 'flex';
      badge.textContent = totalQty;
      fabTotal.style.display = '';
      let grandTotal = cart.reduce((s, i) => s + i.total, 0);
      fabTotal.textContent = fmt(grandTotal + (tipoEntrega === 'entrega' ? taxaEntrega : 0));
    } else {
      fab.classList.add('compact');
      badge.style.display = 'none';
      fabTotal.style.display = 'none';
    }

    /* Refresh + buttons */
    document.querySelectorAll('.add-btn-round[data-prod-id]').forEach((btn) => {
      const prodId = Number(btn.dataset.prodId);
      const q = cart.filter((i) => i.produtoId === prodId).reduce((s, i) => s + i.qty, 0);
      btn.className = 'add-btn-round' + (q > 0 ? ' has-qty' : '');
      btn.innerHTML = q > 0 ? String(q) : '+';
    });

    /* Cart items */
    const itemsEl = document.getElementById('cart-items');
    if (cart.length === 0) {
      itemsEl.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#24348B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3h2l2.4 12.3a2 2 0 0 0 2 1.7h7.6a2 2 0 0 0 2-1.6L21 7H6.5"/>
              <circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/>
            </svg>
          </div>
          <div class="cart-empty-title">Sua sacola está vazia</div>
          <div class="cart-empty-sub">Adicione itens para começar.</div>
        </div>`;
      document.getElementById('cart-total-display').innerHTML = '';
      document.getElementById('cart-footer').style.display = 'none';
      return;
    }

    document.getElementById('cart-footer').style.display = '';
    itemsEl.innerHTML = '';

    cart.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'cart-item-row';
      const unLabel = item.tipo === 'pote'
        ? `${item.qty > 1 ? item.qty + ' × ' : ''}${fmt(item.preco)}`
        : `${item.qty} un × ${fmt(item.preco)}`;

      div.innerHTML = `
        <div class="cart-item-badge">${item.qty}×</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.saborLabel}</div>
          <div class="cart-item-detail">${item.categoria} · ${fmt(item.total)}</div>
        </div>
        <div class="cart-item-ctrl">
          <button class="cart-ctrl-btn" data-action="dec" data-id="${item.id}">−</button>
          <span class="cart-ctrl-val">${item.qty}</span>
          <button class="cart-ctrl-btn inc" data-action="inc" data-id="${item.id}">+</button>
        </div>
      `;
      itemsEl.appendChild(div);
    });

    itemsEl.querySelectorAll('.cart-ctrl-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.id);
        const item = cart.find((i) => i.id === id);
        if (!item) return;
        if (btn.dataset.action === 'inc') {
          item.qty++;
          item.total = item.preco * item.qty;
        } else {
          item.qty--;
          if (item.qty <= 0) { cart = cart.filter((i) => i.id !== id); }
          else { item.total = item.preco * item.qty; }
        }
        recalcularCarrinhoPicole();
        updateAllPicoleSummaries();
        updateCartUI();
      });
    });

    /* Totals */
    let grandTotal = cart.reduce((s, i) => s + i.total, 0);
    const totalEl = document.getElementById('cart-total-display');
    if (tipoEntrega === 'entrega' && taxaEntrega > 0) {
      totalEl.innerHTML = `
        <div class="cart-totals-row">
          <span class="cart-totals-label">Subtotal · ${cart.length} ${cart.length === 1 ? 'item' : 'itens'}</span>
          <span class="cart-totals-value">${fmt(grandTotal + taxaEntrega)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:2px">
          <span class="cart-fee-line" style="color:var(--sub)">Entrega</span>
          <span class="cart-fee-line">${fmt(taxaEntrega)}</span>
        </div>`;
    } else {
      totalEl.innerHTML = `
        <div class="cart-totals-row">
          <span class="cart-totals-label">${cart.length} ${cart.length === 1 ? 'item' : 'itens'}</span>
          <span class="cart-totals-value">${fmt(grandTotal)}</span>
        </div>
        ${tipoEntrega === 'entrega' ? '<div style="font-size:11px;color:#1A8754;font-weight:700;margin-top:2px">Entrega grátis</div>' : ''}`;
    }
  }

  /* ─── Cart open/close (mobile only; desktop cart is always visible) ─── */
  function isDesktop() { return window.innerWidth >= 960; }
  function openCart() {
    if (isDesktop()) return;
    document.getElementById('cart-backdrop').classList.add('open');
    document.getElementById('cart-sheet').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeCart() {
    if (isDesktop()) return;
    document.getElementById('cart-backdrop').classList.remove('open');
    document.getElementById('cart-sheet').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('cart-fab').addEventListener('click', openCart);
  document.getElementById('cart-close').addEventListener('click', closeCart);
  document.getElementById('cart-backdrop').addEventListener('click', closeCart);

  /* ─── Delivery toggle ─── */
  document.getElementById('btn-retirada').addEventListener('click', () => {
    tipoEntrega = 'retirada';
    document.getElementById('btn-retirada').classList.add('active');
    document.getElementById('btn-entrega').classList.remove('active');
    document.getElementById('campos-entrega').style.display = 'none';
    document.getElementById('forma-pagamento').style.display = 'none';
    formaPagamento = null; precisaTroco = false;
    document.querySelectorAll('[data-method]').forEach((b) => b.classList.remove('active'));
    document.getElementById('troco-wrap').style.display = 'none';
    document.getElementById('troco-valor-wrap').style.display = 'none';
    updateCartUI();
  });
  document.getElementById('btn-entrega').addEventListener('click', () => {
    tipoEntrega = 'entrega';
    document.getElementById('btn-entrega').classList.add('active');
    document.getElementById('btn-retirada').classList.remove('active');
    document.getElementById('campos-entrega').style.display = '';
    document.getElementById('forma-pagamento').style.display = '';
    updateCartUI();
  });

  /* ─── Payment ─── */
  document.querySelectorAll('[data-method]').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-method]').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      formaPagamento = btn.dataset.method;
      document.getElementById('troco-wrap').style.display = formaPagamento === 'dinheiro' ? '' : 'none';
      if (formaPagamento !== 'dinheiro') { precisaTroco = false; document.getElementById('troco-valor-wrap').style.display = 'none'; }
    });
  });
  document.getElementById('btn-sem-troco').addEventListener('click', () => {
    precisaTroco = false;
    document.getElementById('btn-sem-troco').classList.add('active');
    document.getElementById('btn-com-troco').classList.remove('active');
    document.getElementById('troco-valor-wrap').style.display = 'none';
  });
  document.getElementById('btn-com-troco').addEventListener('click', () => {
    precisaTroco = true;
    document.getElementById('btn-com-troco').classList.add('active');
    document.getElementById('btn-sem-troco').classList.remove('active');
    document.getElementById('troco-valor-wrap').style.display = '';
  });

  /* ─── Loja fechada no carrinho ─── */
  if (!lojaAberta) {
    const sendBtn = document.getElementById('send-btn');
    sendBtn.disabled = true;
    sendBtn.textContent = '🔒 Loja fechada';
    const notice = document.createElement('div');
    notice.className = 'notice-closed';
    notice.innerHTML = `⏰ Abrimos às <strong>${cardapio.abre}</strong> e fechamos às <strong>${cardapio.fecha}</strong>.`;
    sendBtn.parentNode.insertBefore(notice, sendBtn);
  }

  /* ─── WhatsApp message ─── */
  function buildWhatsAppMsg(nome) {
    let grandTotal = 0;
    let msg = `Olá Dubon! Meu pedido:\n\n👤 Nome: ${nome}\n\n`;
    cart.forEach((item) => {
      grandTotal += item.total;
      const unLabel = item.tipo === 'pote'
        ? `${item.qty > 1 ? item.qty + ' × ' : ''}${fmt(item.preco)} = ${fmt(item.total)}`
        : `${item.qty} un × ${fmt(item.preco)} = ${fmt(item.total)}`;
      msg += `${item.emoji || ''} *${item.categoria} — ${unLabel}*\n`;
      msg += `Sabor${item.saborLabel.includes(',') ? 'es' : ''}: ${item.saborLabel}\n`;
      if (item.note) msg += `Obs: ${item.note}\n`;
      msg += '\n';
    });
    if (tipoEntrega === 'retirada') {
      msg += `📍 Retirada na loja\n`;
    } else {
      const rua = document.getElementById('inp-rua').value.trim();
      const numero = document.getElementById('inp-numero').value.trim();
      const bairro = document.getElementById('inp-bairro').value.trim();
      const referencia = document.getElementById('inp-referencia').value.trim();
      msg += `📍 Entrega:\n🏠 ${rua}, Nº ${numero}\n🏘️ Bairro: ${bairro}\n`;
      if (referencia) msg += `📌 Referência: ${referencia}\n`;
      if (formaPagamento === 'dinheiro') {
        const troco = document.getElementById('inp-troco').value.trim();
        if (precisaTroco && troco) {
          const v = parseFloat(troco.replace(',', '.'));
          msg += `💵 *Pagamento: Dinheiro (troco para R$ ${!isNaN(v) ? v.toFixed(2).replace('.', ',') : troco})*\n`;
        } else if (precisaTroco) {
          msg += `💵 *Pagamento: Dinheiro (precisa de troco)*\n`;
        } else {
          msg += `💵 *Pagamento: Dinheiro (sem troco)*\n`;
        }
      } else if (formaPagamento === 'maquina') {
        msg += `💳 *Pagamento: Máquina (cartão / Pix QR)*\n`;
      } else if (formaPagamento === 'pix') {
        msg += `📱 *Pagamento: Pix pela chave*\n`;
      }
    }
    const totalComTaxa = tipoEntrega === 'entrega' ? grandTotal + taxaEntrega : grandTotal;
    msg += `\n💰 *Total: ${fmt(totalComTaxa)}*`;
    if (tipoEntrega === 'entrega' && taxaEntrega > 0) msg += ` _(inclui taxa ${fmt(taxaEntrega)})_`;
    if (formaPagamento === 'pix' && pixChave) {
      msg += `\n\n——————————\nPix`;
      if (pixNome) msg += `\n${pixNome}`;
      if (pixTipo) msg += `\n${pixTipo}`;
      msg += `\n${pixChave}\nEnviar comprovante por favor`;
    }
    return msg;
  }

  /* ─── Confirmação ─── */
  function mostrarConfirmacao(waMsg) {
    document.getElementById('cart-body-main').style.display = 'none';
    const conf = document.getElementById('cart-confirmacao');
    const waSvg = `<svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
    const waBtn = whatsapp
      ? `<a id="wa-confirm-btn" href="https://wa.me/${whatsapp}?text=${encodeURIComponent(waMsg)}" target="_blank">${waSvg} Enviar pelo WhatsApp</a>`
      : '';
    conf.innerHTML = `
      <div class="confirm-icon">🎉</div>
      <div class="confirm-title">Pedido recebido!</div>
      <div class="confirm-sub">Aguarde a confirmação da sorveteria.</div>
      ${waBtn}
      <button id="novo-pedido-btn">Fazer novo pedido</button>`;
    conf.style.display = 'flex';

    document.getElementById('novo-pedido-btn').addEventListener('click', () => {
      cart = []; formaPagamento = null; precisaTroco = false;
      ['inp-nome','inp-whatsapp','inp-rua','inp-numero','inp-bairro','inp-referencia','inp-troco'].forEach((id) => {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      document.querySelectorAll('[data-method]').forEach((b) => b.classList.remove('active'));
      document.getElementById('btn-sem-troco').classList.add('active');
      document.getElementById('btn-com-troco').classList.remove('active');
      document.getElementById('troco-wrap').style.display = 'none';
      document.getElementById('troco-valor-wrap').style.display = 'none';
      document.getElementById('cart-body-main').style.display = '';
      conf.style.display = 'none';
      recalcularCarrinhoPicole(); updateAllPicoleSummaries(); updateCartUI();
      closeCart();
    });
  }

  /* ─── Finalizar pedido ─── */
  document.getElementById('send-btn').addEventListener('click', async () => {
    if (cart.length === 0) { alert('Adicione itens ao pedido antes de enviar.'); return; }

    const nome = document.getElementById('inp-nome').value.trim();
    const waRaw = document.getElementById('inp-whatsapp').value.replace(/\D/g, '');
    if (!waRaw || waRaw.length < 10) { alert('Informe seu WhatsApp com DDD (só números, ex: 17991234567).'); return; }

    let rua = '', numero = '', bairro = '', referencia = '';
    if (tipoEntrega === 'entrega') {
      rua       = document.getElementById('inp-rua').value.trim();
      numero    = document.getElementById('inp-numero').value.trim();
      bairro    = document.getElementById('inp-bairro').value.trim();
      referencia = document.getElementById('inp-referencia').value.trim();
      if (!rua)    { alert('Informe a rua para entrega.'); return; }
      if (!numero) { alert('Informe o número para entrega.'); return; }
      if (!bairro) { alert('Informe o bairro para entrega.'); return; }
      if (!formaPagamento) { alert('Selecione a forma de pagamento.'); return; }
    }

    let trocoPara = null;
    if (formaPagamento === 'dinheiro' && precisaTroco) {
      const trocoRaw = document.getElementById('inp-troco').value.trim();
      if (!trocoRaw) { alert('Informe o valor para o troco.'); return; }
      const v = parseFloat(trocoRaw.replace(',', '.'));
      if (isNaN(v) || v <= 0) { alert('Valor do troco inválido.'); return; }
      const totalPedido = cart.reduce((s, i) => s + i.total, 0) + (tipoEntrega === 'entrega' ? taxaEntrega : 0);
      if (v < totalPedido) { alert(`O troco precisa ser maior ou igual ao total (${fmt(totalPedido)}).`); return; }
      trocoPara = v;
    }

    const itens = [];
    cart.forEach((item) => {
      if (item.flavors) {
        item.flavors.forEach((f) => itens.push({ produtoId: f.produtoId, quantidade: f.quantidade }));
      } else {
        itens.push({ produtoId: item.produtoId, quantidade: item.qty, observacao: item.note || null });
      }
    });

    const payload = {
      canal: 'SITE',
      tipoEntrega: tipoEntrega === 'entrega' ? 'ENTREGA' : 'RETIRADA',
      clienteNome: nome || null,
      whatsappCliente: '55' + waRaw,
      rua: rua || null, numero: numero || null, bairro: bairro || null, referencia: referencia || null,
      formaPagamento: formaPagamento ? formaPagamento.toUpperCase() : 'DINHEIRO',
      trocoPara,
      itens,
    };

    const btn = document.getElementById('send-btn');
    btn.disabled = true; btn.textContent = 'Enviando…';

    const nomeParaWA = nome;
    try {
      const res = await fetch(API_URL + '/api/pedidos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Erro ao enviar pedido. Tente novamente.'); return; }
      const waMsg = buildWhatsAppMsg(nomeParaWA);
      mostrarConfirmacao(waMsg);
      cart = []; updateCartUI();
    } catch {
      alert('Não foi possível conectar ao servidor. Verifique sua conexão.');
    } finally {
      btn.disabled = false; btn.textContent = 'Finalizar Pedido';
    }
  });

  updateCartUI();

  /* ─── Desktop left nav ─── */
  const dtNavList = document.getElementById('desktop-nav-list');
  const dtNavCard = document.getElementById('desktop-nav-card');
  if (dtNavList) {
    /* search input above the category list */
    if (dtNavCard) {
      const searchDiv = document.createElement('div');
      searchDiv.id = 'dt-nav-search';
      searchDiv.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7180" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
        </svg>
        <input id="dt-search-input" placeholder="Buscar…" autocomplete="off" />
      `;
      dtNavCard.insertBefore(searchDiv, document.getElementById('desktop-nav-label'));
      document.getElementById('dt-search-input').addEventListener('input', (e) => {
        const msi = document.getElementById('search-input');
        if (msi) { msi.value = e.target.value; msi.dispatchEvent(new Event('input')); }
      });
    }

    cardapio.categorias.forEach((cat, idx) => {
      const btn = document.createElement('button');
      btn.className = 'dt-nav-btn' + (idx === 0 ? ' active' : '');
      btn.innerHTML = `<span class="nav-name">${(cat.emoji ? cat.emoji + ' ' : '') + cat.nome}</span><span class="dt-nav-count">${cat.produtos.length}</span>`;
      btn.addEventListener('click', () => scrollToSection(idx));
      dtNavList.appendChild(btn);
      dtNavBtns.push(btn);
    });
  }

})();
</script>
</body>
</html>
