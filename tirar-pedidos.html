<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tirar Pedidos — Sorveteria Dubon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --brand: #1a2e5a;
        --accent: #4a90d9;
        --bg: #ffffff;
        --surface: #f5f7fa;
        --border: #e0e6ef;
        --text: #222222;
        --muted: #888;
        --radius: 12px;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: #24348b;
        text-align: center;
        padding: 16px 0 0;
      }
      header img {
        width: 150px;
        display: block;
        margin: 0 auto 12px;
      }

      /* ── Tab nav ── */
      .tab-nav {
        display: flex;
        justify-content: center;
        gap: 0;
        margin-top: 4px;
      }
      .tab-btn {
        flex: 0 0 auto;
        min-width: 160px;
        padding: 10px 28px;
        border: none;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.75);
        font-family: "Poppins", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 8px 8px 0 0;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .tab-btn:hover:not(.active) {
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
      }
      .tab-btn.active {
        background: var(--bg);
        color: var(--brand);
      }

      /* ── Tab content ── */
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* ── Main container ── */
      main {
        max-width: 700px;
        margin: 0 auto;
        padding: 24px 16px 100px;
      }

      /* ── Category card ── */
      .categoria {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 24px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(26, 46, 90, 0.06);
      }
      .categoria-header {
        background: var(--surface);
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }
      .categoria-header h2 {
        font-family: "Poppins", sans-serif;
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--brand);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .categoria-header .preco-info {
        margin-top: 8px;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .price-tag {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        font-size: 0.85rem;
        padding: 2px 10px;
        border-radius: 20px;
        margin-left: 4px;
      }
      .price-table {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 8px;
      }
      .price-table .pt-item {
        background: var(--brand);
        color: #fff;
        border-radius: 8px;
        padding: 5px 14px;
        font-size: 0.82rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        line-height: 1.4;
      }
      .price-table .pt-item span {
        font-weight: 700;
        font-size: 0.88rem;
      }

      /* ── Flavor list (potes) ── */
      .flavor-list {
        padding: 8px 0;
      }
      .flavor-row {
        display: flex;
        align-items: center;
        padding: 11px 20px;
        font-size: 0.92rem;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        transition: background 0.13s;
        background: var(--bg);
        border: none;
        width: 100%;
        text-align: left;
        color: var(--text);
        font-family: "Inter", sans-serif;
        gap: 10px;
      }
      .flavor-row:last-child {
        border-bottom: none;
      }
      .flavor-row:hover:not(.disabled) {
        background: #eef4fb;
        color: var(--brand);
      }
      .flavor-row:hover:not(.disabled) .flavor-arrow {
        opacity: 1;
      }
      .flavor-row.disabled {
        color: #bbb;
        text-decoration: line-through;
        cursor: not-allowed;
      }
      .flavor-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }
      .flavor-row.disabled .flavor-dot {
        background: #ccc;
      }
      .flavor-arrow {
        margin-left: auto;
        color: var(--accent);
        font-size: 0.85rem;
        opacity: 0;
        transition: opacity 0.13s;
      }

      /* ── Picolé ── */
      .picole-list {
        padding: 8px 0;
      }
      .picole-flavor-row {
        display: flex;
        align-items: center;
        padding: 7px 14px;
        border-bottom: 1px solid var(--border);
        gap: 6px;
      }
      .picole-flavor-row:last-child {
        border-bottom: none;
      }
      .picole-flavor-name {
        flex: 1;
        font-size: 0.8rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .picole-flavor-name.disabled {
        color: #bbb;
        text-decoration: line-through;
      }
      .qty-ctrl {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .qty-btn {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 1.5px solid var(--accent);
        background: #fff;
        color: var(--accent);
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        transition:
          background 0.13s,
          color 0.13s;
        font-family: "Inter", sans-serif;
      }
      .qty-btn:hover:not(:disabled) {
        background: var(--accent);
        color: #fff;
      }
      .qty-btn:disabled {
        border-color: #ddd;
        color: #ccc;
        cursor: not-allowed;
      }
      .qty-val {
        min-width: 22px;
        text-align: center;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--brand);
      }
      .picole-summary {
        padding: 12px 20px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.88rem;
        color: var(--muted);
      }
      .picole-summary .summary-total {
        font-weight: 700;
        color: var(--brand);
        font-size: 0.95rem;
      }

      /* ── Add button ── */
      .add-btn {
        display: block;
        width: calc(100% - 40px);
        margin: 14px 20px;
        background: var(--brand);
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 10px 20px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        transition:
          background 0.15s,
          transform 0.1s;
        text-align: center;
      }
      .add-btn:hover {
        background: var(--accent);
      }
      .add-btn:active {
        transform: scale(0.97);
      }

      /* ── Modal ── */
      #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 500;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      #modal-overlay.open {
        display: flex;
      }
      #modal-box {
        background: #fff;
        border-radius: var(--radius);
        padding: 28px 24px 20px;
        max-width: 340px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        text-align: center;
      }
      #modal-msg {
        font-size: 1rem;
        color: var(--text);
        line-height: 1.5;
        margin-bottom: 20px;
      }
      #modal-msg strong {
        color: var(--brand);
      }
      .modal-btns {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      #modal-cancel {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        transition: background 0.13s;
      }
      #modal-cancel:hover {
        background: #e8ecf0;
      }
      #modal-confirm {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        background: var(--brand);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        transition: background 0.13s;
      }
      #modal-confirm:hover {
        background: var(--accent);
      }

      /* ── Cart FAB ── */
      #cart-fab {
        position: fixed;
        bottom: 24px;
        right: 20px;
        background: var(--brand);
        color: #fff;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(26, 46, 90, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition: transform 0.15s;
      }
      #cart-fab:hover {
        transform: scale(1.07);
      }
      #cart-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        background: #e74c3c;
        color: #fff;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        font-size: 0.75rem;
        font-weight: 700;
        display: none;
        align-items: center;
        justify-content: center;
      }

      /* ── Cart panel ── */
      #cart-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 200;
        display: none;
      }
      #cart-panel {
        position: fixed;
        top: 0;
        right: -100%;
        width: min(420px, 100vw);
        height: 100vh;
        background: #fff;
        z-index: 300;
        display: flex;
        flex-direction: column;
        box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
        transition: right 0.3s ease;
      }
      #cart-panel.open {
        right: 0;
      }
      #cart-overlay.open {
        display: block;
      }
      .cart-top {
        background: var(--brand);
        color: #fff;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .cart-top h2 {
        font-family: "Poppins", sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
      }
      #cart-close {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.5rem;
        cursor: pointer;
        line-height: 1;
      }
      .cart-body {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #cart-items {
        flex: 1;
        padding: 16px 20px;
      }
      .cart-empty {
        text-align: center;
        color: var(--muted);
        margin-top: 48px;
        font-size: 0.95rem;
      }
      .cart-item {
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
      }
      .cart-item-name {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--brand);
      }
      .cart-item-detail {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .cart-item-price {
        font-weight: 700;
        font-size: 0.9rem;
        color: var(--text);
        margin-top: 4px;
      }
      .cart-item-remove {
        background: none;
        border: none;
        color: #e74c3c;
        font-size: 0.8rem;
        cursor: pointer;
        padding: 0;
        margin-top: 4px;
        text-decoration: underline;
      }
      .cart-total {
        padding: 12px 20px;
        border-top: 2px solid var(--border);
        font-family: "Poppins", sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--brand);
        flex-shrink: 0;
      }
      .cart-form {
        padding: 12px 20px 32px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .cart-form label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 4px;
        margin-top: 10px;
      }
      .cart-form input {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.9rem;
        font-family: "Inter", sans-serif;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
      }
      .cart-form input:focus {
        border-color: var(--accent);
      }
      .delivery-toggle {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }
      .delivery-btn {
        flex: 1;
        padding: 9px 6px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        transition: all 0.15s;
        text-align: center;
      }
      .delivery-btn.active {
        border-color: var(--brand);
        background: var(--brand);
        color: #fff;
      }
      .delivery-btn:hover:not(.active) {
        border-color: var(--accent);
        color: var(--accent);
      }

      #print-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin-top: 16px;
        background: var(--brand);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 13px;
        font-size: 1rem;
        font-weight: 700;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      #print-btn:hover {
        background: var(--accent);
      }
      #print-btn:active {
        transform: scale(0.98);
      }

      /* ── Payment method ── */
      .payment-toggle {
        display: flex;
        gap: 6px;
        margin-top: 6px;
        flex-wrap: wrap;
      }
      .payment-btn {
        flex: 1;
        min-width: 80px;
        padding: 8px 6px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        transition: all 0.15s;
        text-align: center;
      }
      .payment-btn.active {
        border-color: var(--brand);
        background: var(--brand);
        color: #fff;
      }
      .payment-btn:hover:not(.active) {
        border-color: var(--accent);
        color: var(--accent);
      }
      .troco-toggle {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .troco-btn {
        flex: 1;
        padding: 7px 6px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        transition: all 0.15s;
        text-align: center;
      }
      .troco-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      /* ── Aba Imprimir ── */
      .imprimir-wrap {
        max-width: 600px;
        margin: 40px auto;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .imprimir-wrap h2 {
        font-family: "Poppins", sans-serif;
        font-size: 1.1rem;
        color: var(--brand);
      }
      #pedido-texto {
        width: 100%;
        height: 360px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
        font-size: 0.9rem;
        font-family: "Courier New", monospace;
        color: var(--text);
        resize: vertical;
        outline: none;
        transition: border-color 0.15s;
        line-height: 1.5;
      }
      #pedido-texto:focus {
        border-color: var(--accent);
      }
      #btn-imprimir-texto {
        align-self: flex-start;
        background: var(--brand);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: 700;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: background 0.15s;
      }
      #btn-imprimir-texto:hover {
        background: var(--accent);
      }

      /* ── Print area (oculto na tela) ── */
      #print-area {
        display: none;
      }

      /* ── IMPRESSÃO 58mm ── */
      @media print {
        @page {
          size: 58mm auto;
          margin: 0;
        }

        body > *:not(#print-area) {
          display: none !important;
        }

        #print-area {
          display: block !important;
          width: 100%;
          font-family: "Courier New", Courier, monospace;
          font-size: 9pt;
          font-weight: bold;
          line-height: 1.1;
          color: #000;
          white-space: pre-wrap;
          word-break: break-word;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <img
        src="assets/Logo.png"
        alt="Logo Dubon"
        onerror="this.style.display = 'none'"
      />
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="pedido">Tirar Pedido</button>
        <button class="tab-btn" data-tab="imprimir">Imprimir</button>
      </nav>
    </header>

    <!-- Aba: Tirar Pedido -->
    <div id="tab-pedido" class="tab-content active">
      <main id="menu"></main>
    </div>

    <!-- Aba: Imprimir (colar do WhatsApp) -->
    <div id="tab-imprimir" class="tab-content">
      <div class="imprimir-wrap">
        <h2>Colar pedido do WhatsApp</h2>
        <textarea
          id="pedido-texto"
          placeholder="Cole aqui a mensagem do pedido recebida pelo WhatsApp..."
        ></textarea>
        <button id="btn-imprimir-texto">🖨️ Imprimir</button>
      </div>
    </div>

    <!-- Cart FAB -->
    <button id="cart-fab" title="Ver pedido">
      🛒
      <span id="cart-badge"></span>
    </button>

    <!-- Cart Panel -->
    <div id="cart-overlay"></div>
    <div id="cart-panel">
      <div class="cart-top">
        <h2>Pedido</h2>
        <button id="cart-close" title="Fechar">&times;</button>
      </div>
      <div class="cart-body">
        <div id="cart-items"></div>
        <div class="cart-total" id="cart-total-display"></div>
        <div class="cart-form">
          <label>Forma de entrega</label>
          <div class="delivery-toggle">
            <button class="delivery-btn" id="btn-retirada" type="button">
              🏪 Retirar na loja
            </button>
            <button class="delivery-btn active" id="btn-entrega" type="button">
              🛵 Entrega
            </button>
          </div>
          <label for="inp-nome">Nome do cliente *</label>
          <input type="text" id="inp-nome" placeholder="Ex: João" />
          <label for="inp-contato">WhatsApp do cliente (opcional)</label>
          <input type="tel" id="inp-contato" inputmode="numeric" placeholder="Ex: 44999999999" />
          <div id="campos-entrega" style="display: block">
            <label for="inp-rua">Rua *</label>
            <input type="text" id="inp-rua" placeholder="Ex: Rua das Flores" />
            <label for="inp-numero">Número *</label>
            <input type="text" id="inp-numero" placeholder="Ex: 123" />
            <label for="inp-bairro">Bairro *</label>
            <input type="text" id="inp-bairro" placeholder="Ex: Centro" />
            <label for="inp-referencia">Referência</label>
            <input
              type="text"
              id="inp-referencia"
              placeholder="Ex: Próximo ao mercado"
            />
          </div>
          <div id="forma-pagamento" style="display: block">
            <label>Forma de pagamento</label>
            <div class="payment-toggle">
              <button class="payment-btn" data-method="dinheiro" type="button">
                💵 Dinheiro
              </button>
              <button class="payment-btn" data-method="maquina" type="button">
                💳 Cartão/QRcode
              </button>
              <button class="payment-btn" data-method="pix" type="button">
                📱 Chave Pix
              </button>
            </div>
            <div id="troco-wrap" style="display: none">
              <div class="troco-toggle">
                <button
                  class="troco-btn active"
                  id="btn-sem-troco"
                  type="button"
                >
                  Sem troco
                </button>
                <button class="troco-btn" id="btn-com-troco" type="button">
                  Preciso de troco
                </button>
              </div>
              <div id="troco-valor-wrap" style="display: none">
                <label for="inp-troco">Troco para quanto?</label>
                <input type="text" id="inp-troco" placeholder="Ex: 50,00" />
              </div>
            </div>
          </div>
          <button id="print-btn">✅ Enviar e Imprimir</button>
        </div>
      </div>
    </div>

    <!-- Modal (confirmação potes) -->
    <div id="modal-overlay">
      <div id="modal-box">
        <p id="modal-msg"></p>
        <div class="modal-btns">
          <button id="modal-cancel">Cancelar</button>
          <button id="modal-confirm">Adicionar</button>
        </div>
      </div>
    </div>

    <!-- Área de impressão (invisível na tela) -->
    <div id="print-area"></div>

    <script>
      const API_URL = 'https://backdubon-production.up.railway.app';

      (async () => {
        /* ── Cardápio via API ── */
        let cardapio;
        try {
          const res = await fetch(API_URL + '/api/cardapio');
          if (!res.ok) throw new Error();
          const raw = await res.json();
          cardapio = normalizarCardapio(raw);
        } catch (e) {
          document.getElementById("menu").innerHTML =
            '<p style="text-align:center;color:#e74c3c;padding:32px">Erro ao carregar o cardápio.</p>';
          return;
        }

        function normalizarCardapio(apiData) {
          const categorias = (apiData.categorias || []).map(cat => ({
            ...cat,
            tipo: cat.tipo.toLowerCase() === 'picole' ? 'picole' : 'pote',
            preco_unico: cat.precosPorQuantidade?.[0]
              ? parseFloat(cat.precosPorQuantidade[0].preco) : 0,
            precos_quantidade: Object.fromEntries(
              (cat.precosPorQuantidade || []).map(p => [String(p.quantidadeMinima), parseFloat(p.preco)])
            ),
            pool_quantidade: !!cat.poolId,
            descricao_categoria: '',
            produtos: [...(cat.produtos || [])].sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR')),
          })).sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
          return { taxa_entrega: parseFloat(apiData.configuracoes?.taxa_entrega || '0'), categorias };
        }

        const taxaEntrega = cardapio.taxa_entrega || 0;

        /* ── Tabs ── */
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".tab-btn")
              .forEach((b) => b.classList.remove("active"));
            document
              .querySelectorAll(".tab-content")
              .forEach((t) => t.classList.remove("active"));
            btn.classList.add("active");
            document
              .getElementById("tab-" + btn.dataset.tab)
              .classList.add("active");
            const fab = document.getElementById("cart-fab");
            fab.style.display = btn.dataset.tab === "pedido" ? "flex" : "none";
          });
        });

        /* ── Cart state ── */
        let cart = [];
        let nextId = 0;
        let tipoEntrega = "entrega";
        let formaPagamento = null;
        let precisaTroco = false;

        /* ── Picolé qty state + mapa de IDs ── */
        const picoleQty = {};
        const prodIdMap = {}; // catIdx -> { prodNome -> prodId }
        cardapio.categorias.forEach((cat, idx) => {
          if (cat.tipo === "picole") {
            picoleQty[idx] = {};
            prodIdMap[idx] = {};
            cat.produtos.forEach((p) => {
              picoleQty[idx][p.nome] = 0;
              prodIdMap[idx][p.nome] = p.id;
            });
          }
        });

        /* ── Helpers ── */
        function fmt(v) {
          return "R$ " + v.toFixed(2).replace(".", ",");
        }

        function picolePrice(precos, qty) {
          const keys = Object.keys(precos)
            .map(Number)
            .sort((a, b) => b - a);
          for (const k of keys) {
            if (qty >= k) return precos[String(k)];
          }
          return precos["1"];
        }

        function somaQty(flavorMap) {
          return Object.values(flavorMap).reduce((a, b) => a + b, 0);
        }

        function tamanhoFromNome(nome) {
          const m = nome.match(/(\d[\d,]*)\s*[Ll]itros?/);
          return m ? m[1] + " litros" : nome;
        }

        function catDoItem(item) {
          return (
            cardapio.categorias.find((c) => c.nome === item.categoria) || {}
          );
        }
        function ehPoolQtd(cat) {
          return cat.pool_quantidade === true;
        }

        function precoEfetivoPicole(catIdx, cat) {
          if (!ehPoolQtd(cat)) return picolePrice(cat.precos_quantidade, 1);
          let totalSelecao = 0;
          cardapio.categorias.forEach((c, i) => {
            if (ehPoolQtd(c)) totalSelecao += somaQty(picoleQty[i]);
          });
          const totalCarrinho = cart
            .filter(
              (item) => item.tipo === "picole" && ehPoolQtd(catDoItem(item)),
            )
            .reduce((s, i) => s + i.qty, 0);
          return picolePrice(
            cat.precos_quantidade,
            totalSelecao + totalCarrinho,
          );
        }

        function recalcularCarrinhoPicole() {
          const totalPoolCarrinho = cart
            .filter((i) => i.tipo === "picole" && ehPoolQtd(catDoItem(i)))
            .reduce((s, i) => s + i.qty, 0);
          cart.forEach((item) => {
            if (item.tipo !== "picole") return;
            const cat = catDoItem(item);
            if (!cat.precos_quantidade) return;
            item.preco = ehPoolQtd(cat)
              ? picolePrice(cat.precos_quantidade, totalPoolCarrinho)
              : picolePrice(cat.precos_quantidade, 1);
            item.total = item.preco * item.qty;
          });
        }

        /* ── Modal ── */
        let modalConfirmFn = null;
        function abrirModal(msg, onConfirm) {
          document.getElementById("modal-msg").innerHTML = msg;
          modalConfirmFn = onConfirm;
          document.getElementById("modal-overlay").classList.add("open");
        }
        function fecharModal() {
          document.getElementById("modal-overlay").classList.remove("open");
          modalConfirmFn = null;
        }
        document
          .getElementById("modal-cancel")
          .addEventListener("click", fecharModal);
        document
          .getElementById("modal-confirm")
          .addEventListener("click", () => {
            if (modalConfirmFn) modalConfirmFn();
            fecharModal();
          });
        document
          .getElementById("modal-overlay")
          .addEventListener("click", (e) => {
            if (e.target === document.getElementById("modal-overlay"))
              fecharModal();
          });

        /* ── Add to cart ── */
        function addPoteToCart(cat, prod) {
          cart.push({
            id: nextId++,
            produtoId: prod.id,
            categoria: cat.nome,
            emoji: cat.emoji,
            tipo: "pote",
            saborLabel: prod.nome,
            qty: 1,
            preco: cat.preco_unico,
            total: cat.preco_unico,
          });
          updateCartUI();
        }

        function addPicoleToCart(catIdx, cat) {
          const qtyMap = picoleQty[catIdx];
          const total = somaQty(qtyMap);
          if (total === 0) {
            alert("Selecione ao menos um picolé antes de adicionar.");
            return;
          }
          const flavors = Object.entries(qtyMap)
            .filter(([, q]) => q > 0)
            .map(([nome, quantidade]) => ({ produtoId: prodIdMap[catIdx][nome], nome, quantidade }));
          const saboresList = flavors
            .map(f => f.quantidade > 1 ? `${f.nome} (×${f.quantidade})` : f.nome)
            .join(", ");
          cart.push({
            id: nextId++,
            flavors,
            categoria: cat.nome,
            emoji: cat.emoji,
            tipo: "picole",
            saborLabel: saboresList,
            qty: total,
            preco: 0,
            total: 0,
          });
          recalcularCarrinhoPicole();
          Object.keys(picoleQty[catIdx]).forEach((k) => {
            picoleQty[catIdx][k] = 0;
          });
          const card = document.querySelectorAll(".categoria")[catIdx];
          card.querySelectorAll(".qty-val").forEach((el) => {
            el.textContent = "0";
          });
          updateAllPicoleSummaries();
          updateCartUI();
        }

        /* ── Render menu ── */
        const menu = document.getElementById("menu");
        const picoleSummaryEls = {};

        cardapio.categorias.forEach((cat, idx) => {
          const card = document.createElement("div");
          card.className = "categoria";

          const hdr = document.createElement("div");
          hdr.className = "categoria-header";

          const title = document.createElement("h2");
          title.textContent = cat.nome;
          const expandArrow = document.createElement("span");
          expandArrow.textContent = "▾";
          expandArrow.style.cssText = "margin-left:auto;font-size:1.1rem;color:var(--muted);transition:transform 0.2s;display:inline-block;";
          title.appendChild(expandArrow);
          hdr.appendChild(title);

          const descDiv = document.createElement("div");
          descDiv.className = "preco-info";

          if (cat.tipo === "pote") {
            const unidade =
              cat.unidade_label !== undefined ? cat.unidade_label : "pote";
            const precoLabel = unidade
              ? `${fmt(cat.preco_unico)} / ${unidade}`
              : fmt(cat.preco_unico);
            descDiv.innerHTML = `${cat.descricao_categoria} — <span class="price-tag">${precoLabel}</span>`;
          } else {
            descDiv.textContent = cat.descricao_categoria;
            const p = cat.precos_quantidade;
            const tiers = [
              { label: "1 unidade", key: "1" },
              { label: "10 ou mais", key: "10" },
              { label: "20 ou mais", key: "20" },
            ].filter(({ key }) => p[key] !== undefined);
            const prices = tiers.map((t) => p[t.key]);
            const hasTieredPricing =
              tiers.length > 1 && !prices.every((v) => v === prices[0]);
            if (hasTieredPricing) {
              const table = document.createElement("div");
              table.className = "price-table";
              tiers.forEach(({ label, key }) => {
                const item = document.createElement("div");
                item.className = "pt-item";
                item.innerHTML = `${label}<span>${fmt(p[key])} / un</span>`;
                table.appendChild(item);
              });
              descDiv.appendChild(table);
            }
          }
          card.appendChild(hdr);

          const body = document.createElement("div");
          body.appendChild(descDiv);

          if (cat.tipo === "pote") {
            const list = document.createElement("div");
            list.className = "flavor-list";
            cat.produtos.forEach((prod) => {
              const row = document.createElement("button");
              row.className =
                "flavor-row" + (prod.disponivel ? "" : " disabled");
              row.disabled = !prod.disponivel;
              const nome = document.createElement("span");
              nome.textContent = prod.nome;
              row.appendChild(nome);
              if (prod.disponivel) {
                const arrow = document.createElement("span");
                arrow.className = "flavor-arrow";
                arrow.textContent = "+ Adicionar";
                row.appendChild(arrow);
                row.addEventListener("click", () => {
                  abrirModal(
                    `Adicionar <strong>${prod.nome}</strong><br>de ${tamanhoFromNome(cat.nome)} ao pedido?`,
                    () => addPoteToCart(cat, prod),
                  );
                });
              }
              list.appendChild(row);
            });
            body.appendChild(list);
          } else {
            const list = document.createElement("div");
            list.className = "picole-list";
            cat.produtos.forEach((prod) => {
              const row = document.createElement("div");
              row.className = "picole-flavor-row";
              const nameEl = document.createElement("span");
              nameEl.className =
                "picole-flavor-name" + (prod.disponivel ? "" : " disabled");
              nameEl.textContent = prod.nome;
              row.appendChild(nameEl);
              const ctrl = document.createElement("div");
              ctrl.className = "qty-ctrl";
              const btnMinus = document.createElement("button");
              btnMinus.className = "qty-btn";
              btnMinus.textContent = "−";
              btnMinus.disabled = !prod.disponivel;
              const valEl = document.createElement("span");
              valEl.className = "qty-val";
              valEl.textContent = "0";
              const btnPlus = document.createElement("button");
              btnPlus.className = "qty-btn";
              btnPlus.textContent = "+";
              btnPlus.disabled = !prod.disponivel;
              if (prod.disponivel) {
                btnMinus.addEventListener("click", () => {
                  if (picoleQty[idx][prod.nome] > 0) {
                    picoleQty[idx][prod.nome]--;
                    valEl.textContent = picoleQty[idx][prod.nome];
                    onPicoleQtyChange(idx, cat);
                  }
                });
                btnPlus.addEventListener("click", () => {
                  picoleQty[idx][prod.nome]++;
                  valEl.textContent = picoleQty[idx][prod.nome];
                  onPicoleQtyChange(idx, cat);
                });
              }
              ctrl.appendChild(btnMinus);
              ctrl.appendChild(valEl);
              ctrl.appendChild(btnPlus);
              row.appendChild(ctrl);
              list.appendChild(row);
            });
            body.appendChild(list);

            const summary = document.createElement("div");
            summary.className = "picole-summary";
            summary.innerHTML =
              '<span>Total: <strong>0 unidades</strong></span><span class="summary-total">R$ 0,00</span>';
            picoleSummaryEls[idx] = summary;
            body.appendChild(summary);

            const addBtn = document.createElement("button");
            addBtn.className = "add-btn";
            addBtn.textContent = "Adicionar ao pedido";
            addBtn.addEventListener("click", () => addPicoleToCart(idx, cat));
            body.appendChild(addBtn);
          }

          body.style.display = "none";
          card.appendChild(body);
          hdr.addEventListener("click", () => {
            const isOpen = body.style.display === "none";
            body.style.display = isOpen ? "block" : "none";
            expandArrow.style.transform = isOpen ? "rotate(-180deg)" : "";
          });
          menu.appendChild(card);
        });

        /* ── Picolé summaries ── */
        function updatePicoleSummary(idx, cat) {
          const el = picoleSummaryEls[idx];
          if (!el) return;
          const total = somaQty(picoleQty[idx]);
          const preco = precoEfetivoPicole(idx, cat);
          const unLabel = total === 1 ? "1 unidade" : `${total} unidades`;
          el.innerHTML = `<span>Total: <strong>${unLabel}</strong></span><span class="summary-total">${fmt(preco * total)}</span>`;
        }

        function updateAllPicoleSummaries() {
          cardapio.categorias.forEach((cat, idx) => {
            if (cat.tipo === "picole") updatePicoleSummary(idx, cat);
          });
        }

        function onPicoleQtyChange(changedIdx, changedCat) {
          if (ehPoolQtd(changedCat)) {
            cardapio.categorias.forEach((cat, idx) => {
              if (ehPoolQtd(cat)) updatePicoleSummary(idx, cat);
            });
          } else {
            updatePicoleSummary(changedIdx, changedCat);
          }
        }

        /* ── Cart UI ── */
        function updateCartUI() {
          const badge = document.getElementById("cart-badge");
          if (cart.length > 0) {
            badge.style.display = "flex";
            badge.textContent = cart.length;
          } else {
            badge.style.display = "none";
          }

          const itemsEl = document.getElementById("cart-items");
          const totalEl = document.getElementById("cart-total-display");

          if (cart.length === 0) {
            itemsEl.innerHTML =
              '<p class="cart-empty">O pedido está vazio.</p>';
            totalEl.textContent = "";
            return;
          }

          itemsEl.innerHTML = "";
          let grandTotal = 0;

          cart.forEach((item) => {
            grandTotal += item.total;
            const div = document.createElement("div");
            div.className = "cart-item";
            const unLabel =
              item.tipo === "pote"
                ? `1 un × ${fmt(item.preco)}`
                : `${item.qty} un × ${fmt(item.preco)}`;
            div.innerHTML = `
              <div class="cart-item-name">${item.categoria}</div>
              <div class="cart-item-detail">Sabor: ${item.saborLabel}</div>
              <div class="cart-item-detail">${unLabel}</div>
              <div class="cart-item-price">${fmt(item.total)}</div>
              <button class="cart-item-remove" data-id="${item.id}">Remover</button>
            `;
            itemsEl.appendChild(div);
          });

          itemsEl.querySelectorAll(".cart-item-remove").forEach((btn) => {
            btn.addEventListener("click", () => {
              cart = cart.filter((i) => i.id !== Number(btn.dataset.id));
              recalcularCarrinhoPicole();
              updateAllPicoleSummaries();
              updateCartUI();
            });
          });

          if (tipoEntrega === "entrega" && taxaEntrega > 0) {
            totalEl.innerHTML =
              `<span style="font-size:0.85rem;font-weight:400;color:var(--muted)">Subtotal: ${fmt(grandTotal)}</span><br>` +
              `<span style="font-size:0.85rem;font-weight:400;color:var(--muted)">Taxa de entrega: ${fmt(taxaEntrega)}</span><br>` +
              `Total: ${fmt(grandTotal + taxaEntrega)}`;
          } else {
            totalEl.textContent = `Total: ${fmt(grandTotal)}`;
          }
        }

        /* ── Cart open/close ── */
        function openCart() {
          document.getElementById("cart-panel").classList.add("open");
          document.getElementById("cart-overlay").classList.add("open");
        }
        function closeCart() {
          document.getElementById("cart-panel").classList.remove("open");
          document.getElementById("cart-overlay").classList.remove("open");
        }

        function limparCarrinho() {
          cart = [];
          formaPagamento = null;
          precisaTroco = false;
          ["inp-nome", "inp-rua", "inp-numero", "inp-bairro", "inp-referencia", "inp-troco"].forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.value = "";
          });
          document.querySelectorAll(".payment-btn").forEach((b) => b.classList.remove("active"));
          document.getElementById("btn-sem-troco").classList.add("active");
          document.getElementById("btn-com-troco").classList.remove("active");
          document.getElementById("troco-wrap").style.display = "none";
          document.getElementById("troco-valor-wrap").style.display = "none";
          recalcularCarrinhoPicole();
          updateAllPicoleSummaries();
          updateCartUI();
        }
        document.getElementById("cart-fab").addEventListener("click", openCart);
        document
          .getElementById("cart-close")
          .addEventListener("click", closeCart);
        document
          .getElementById("cart-overlay")
          .addEventListener("click", closeCart);

        /* ── Delivery toggle ── */
        document
          .getElementById("btn-retirada")
          .addEventListener("click", () => {
            tipoEntrega = "retirada";
            document.getElementById("btn-retirada").classList.add("active");
            document.getElementById("btn-entrega").classList.remove("active");
            document.getElementById("campos-entrega").style.display = "none";
            document.getElementById("forma-pagamento").style.display = "none";
            formaPagamento = null;
            precisaTroco = false;
            document
              .querySelectorAll(".payment-btn")
              .forEach((b) => b.classList.remove("active"));
            document.getElementById("troco-wrap").style.display = "none";
            document.getElementById("troco-valor-wrap").style.display = "none";
            updateCartUI();
          });
        document.getElementById("btn-entrega").addEventListener("click", () => {
          tipoEntrega = "entrega";
          document.getElementById("btn-entrega").classList.add("active");
          document.getElementById("btn-retirada").classList.remove("active");
          document.getElementById("campos-entrega").style.display = "block";
          document.getElementById("forma-pagamento").style.display = "block";
          updateCartUI();
        });

        /* ── Payment method ── */
        document.querySelectorAll(".payment-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".payment-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            formaPagamento = btn.dataset.method;
            document.getElementById("troco-wrap").style.display =
              formaPagamento === "dinheiro" ? "block" : "none";
            if (formaPagamento !== "dinheiro") {
              precisaTroco = false;
              document.getElementById("troco-valor-wrap").style.display =
                "none";
            }
          });
        });

        document
          .getElementById("btn-sem-troco")
          .addEventListener("click", () => {
            precisaTroco = false;
            document.getElementById("btn-sem-troco").classList.add("active");
            document.getElementById("btn-com-troco").classList.remove("active");
            document.getElementById("troco-valor-wrap").style.display = "none";
          });

        document
          .getElementById("btn-com-troco")
          .addEventListener("click", () => {
            precisaTroco = true;
            document.getElementById("btn-com-troco").classList.add("active");
            document.getElementById("btn-sem-troco").classList.remove("active");
            document.getElementById("troco-valor-wrap").style.display = "block";
          });

        /* ── Gerar recibo (texto para impressora 58mm) ── */
        function gerarRecibo() {
          const now = new Date();
          const data = now.toLocaleDateString("pt-BR");
          const hora = now.toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit",
          });
          const SEP = "--------------------------------";
          const TITLE = "================================";

          let txt = "    SORVETERIA DUBON\n";
          txt += "  Monte Azul Paulista, SP\n";
          txt += TITLE + "\n";
          txt += `${data}  ${hora}\n`;

          const nome = document.getElementById("inp-nome").value.trim();
          txt += `Cliente: ${nome}\n`;

          txt += SEP + "\n";

          let grandTotal = 0;
          cart.forEach((item) => {
            grandTotal += item.total;
            txt += `${item.categoria}\n`;
            txt += `  ${item.saborLabel}\n`;
            if (item.tipo === "pote") {
              txt += `  1 un  x  ${fmt(item.preco)}  =  ${fmt(item.total)}\n`;
            } else {
              txt += `  ${item.qty} un  x  ${fmt(item.preco)}  =  ${fmt(item.total)}\n`;
            }
            txt += "\n";
          });

          txt += SEP + "\n";

          if (tipoEntrega === "retirada") {
            txt += "Entrega: RETIRADA NA LOJA\n";
          } else {
            const rua = document.getElementById("inp-rua").value.trim();
            const numero = document.getElementById("inp-numero").value.trim();
            const bairro = document.getElementById("inp-bairro").value.trim();
            const ref = document.getElementById("inp-referencia").value.trim();
            txt += "Entrega:\n";
            txt += `  ${rua}, ${numero}\n`;
            txt += `  Bairro: ${bairro}\n`;
            if (ref) txt += `  Ref: ${ref}\n`;
          }

          if (tipoEntrega === "entrega") {
            txt += SEP + "\n";
            if (formaPagamento === "dinheiro") {
              const troco = document.getElementById("inp-troco").value.trim();
              if (precisaTroco && troco) {
                const trocoNum = parseFloat(troco.replace(",", "."));
                const trocoFmt = !isNaN(trocoNum) ? trocoNum.toFixed(2).replace(".", ",") : troco;
                txt += `PAGAMENTO: Dinheiro\n  Troco para: R$ ${trocoFmt}\n`;
              } else if (precisaTroco) {
                txt += `PAGAMENTO: Dinheiro (troco)\n`;
              } else {
                txt += `PAGAMENTO: Dinheiro (sem troco)\n`;
              }
            } else if (formaPagamento === "maquina") {
              txt += `PAGAMENTO: Maquina (cartao/Pix QR)\n`;
            } else if (formaPagamento === "pix") {
              txt += `PAGAMENTO: Pix pela chave\n`;
            }
          }

          txt += SEP + "\n";
          let totalFinal = grandTotal;
          if (tipoEntrega === "entrega" && taxaEntrega > 0) {
            txt += `Subtotal: ${fmt(grandTotal)}\n`;
            txt += `Taxa entrega: ${fmt(taxaEntrega)}\n`;
            totalFinal += taxaEntrega;
          }
          txt += `** TOTAL: ${fmt(totalFinal)} **\n`;
          txt += TITLE + "\n";

          return txt;
        }

        /* ── Enviar pedido à API e imprimir ── */
        document.getElementById("print-btn").addEventListener("click", async () => {
          if (cart.length === 0) { alert("Adicione itens ao pedido antes de enviar."); return; }
          const nome = document.getElementById("inp-nome").value.trim();
          if (!nome) { alert("Informe o nome do cliente."); return; }

          const rua      = document.getElementById("inp-rua").value.trim();
          const numero   = document.getElementById("inp-numero").value.trim();
          const bairro   = document.getElementById("inp-bairro").value.trim();
          const ref      = document.getElementById("inp-referencia").value.trim();
          const contatoRaw = document.getElementById("inp-contato").value.trim().replace(/\D/g, "");

          if (tipoEntrega === "entrega") {
            if (!rua)    { alert("Informe a rua."); return; }
            if (!numero) { alert("Informe o número."); return; }
            if (!bairro) { alert("Informe o bairro."); return; }
            if (!formaPagamento) { alert("Selecione a forma de pagamento."); return; }
            if (formaPagamento === "dinheiro" && precisaTroco) {
              const trocoInput = document.getElementById("inp-troco").value.trim();
              if (!trocoInput) { alert("Informe o valor para o troco."); return; }
              const grandTotal = cart.reduce((s, i) => s + i.total, 0);
              const trocoVal = parseFloat(trocoInput.replace(",", "."));
              if (isNaN(trocoVal) || trocoVal < grandTotal + taxaEntrega) {
                alert(`Troco deve ser maior ou igual ao total (${fmt(grandTotal + taxaEntrega)}).`);
                return;
              }
            }
          }

          let trocoPara = null;
          if (formaPagamento === "dinheiro" && precisaTroco) {
            const v = parseFloat(document.getElementById("inp-troco").value.trim().replace(",", "."));
            if (!isNaN(v)) trocoPara = v;
          }

          const itens = [];
          cart.forEach(item => {
            if (item.flavors) {
              item.flavors.forEach(f => itens.push({ produtoId: f.produtoId, quantidade: f.quantidade }));
            } else {
              itens.push({ produtoId: item.produtoId, quantidade: item.qty });
            }
          });

          const payload = {
            canal: 'ATENDENTE',
            tipoEntrega: tipoEntrega === 'entrega' ? 'ENTREGA' : 'RETIRADA',
            clienteNome: nome || null,
            whatsappCliente: contatoRaw ? '55' + contatoRaw : null,
            rua: rua || null,
            numero: numero || null,
            bairro: bairro || null,
            referencia: ref || null,
            formaPagamento: (formaPagamento || 'dinheiro').toUpperCase(),
            trocoPara,
            itens,
          };

          const btn = document.getElementById("print-btn");
          btn.disabled = true;
          btn.textContent = "Enviando…";

          try {
            const res = await fetch(API_URL + '/api/pedidos', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (!res.ok) { alert(data.error || 'Erro ao enviar pedido.'); return; }

            document.getElementById("print-area").textContent = gerarRecibo();
            window.print();
            limparCarrinho();
            closeCart();
          } catch {
            alert('Erro de conexão. Verifique a internet.');
          } finally {
            btn.disabled = false;
            btn.textContent = "✅ Enviar e Imprimir";
          }
        });

        /* ── Imprimir (aba Imprimir — colar do WhatsApp) ── */
        document
          .getElementById("btn-imprimir-texto")
          .addEventListener("click", () => {
            const texto = document.getElementById("pedido-texto").value.trim();
            if (!texto) {
              alert("Cole o texto do pedido antes de imprimir.");
              return;
            }
            document.getElementById("print-area").textContent = texto;
            window.print();
          });

        updateCartUI();
      })();
    </script>
  </body>
</html>
